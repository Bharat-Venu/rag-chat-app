<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>docRAG — PDF Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0f; --surface: #111118; --surface2: #18181f;
    --border: #2a2a3a; --accent: #7c6af7; --accent2: #f7c56a;
    --text: #e8e8f0; --muted: #666680;
    --success: #6af7b0; --danger: #f76a6a;
  }
  body { background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; height: 100vh; overflow: hidden; }

  .app { display: grid; grid-template-columns: 300px 1fr; grid-template-rows: 58px 1fr; height: 100vh; }

  /* HEADER */
  .header {
    grid-column: 1 / -1;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; padding: 0 24px; gap: 12px;
    position: relative; overflow: hidden;
  }
  .header::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2), var(--accent));
    background-size: 200%; animation: shimmer 3s linear infinite;
  }
  @keyframes shimmer { 0%{background-position:0%} 100%{background-position:200%} }
  .logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 18px; }
  .logo span { color: var(--accent); }
  .badge { font-size: 10px; padding: 2px 8px; border-radius: 20px; background: rgba(124,106,247,0.15); color: var(--accent); border: 1px solid rgba(124,106,247,0.3); letter-spacing: 1px; }
  .status { margin-left: auto; display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--muted); }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); transition: background 0.3s; }
  .dot.active { background: var(--success); box-shadow: 0 0 8px var(--success); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

  /* SIDEBAR */
  .sidebar {
    background: var(--surface); border-right: 1px solid var(--border);
    padding: 20px; display: flex; flex-direction: column; gap: 18px; overflow-y: auto;
  }
  .label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
  input[type=text], input[type=password] {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 12px; color: var(--text);
    font-family: 'DM Mono', monospace; font-size: 12px; outline: none; transition: border-color 0.2s;
  }
  input:focus { border-color: var(--accent); }
  input::placeholder { color: var(--muted); }

  .dropzone {
    border: 1.5px dashed var(--border); border-radius: 12px; padding: 22px 16px;
    text-align: center; cursor: pointer; background: var(--surface2); transition: all 0.2s;
  }
  .dropzone:hover, .dropzone.over { border-color: var(--accent); background: rgba(124,106,247,0.06); }
  .dropzone-icon { font-size: 26px; display: block; margin-bottom: 8px; }
  .dropzone p { font-size: 12px; color: var(--muted); line-height: 1.5; }
  .dropzone strong { color: var(--accent); }

  .btn {
    width: 100%; padding: 10px; background: linear-gradient(135deg, var(--accent), #9b6af7);
    border: none; border-radius: 8px; color: white; font-family: 'Syne', sans-serif;
    font-weight: 600; font-size: 13px; cursor: pointer; transition: opacity 0.2s, transform 0.1s; margin-top: 10px;
  }
  .btn:hover { opacity: 0.88; }
  .btn:active { transform: scale(0.98); }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; }

  .file-list { display: flex; flex-direction: column; gap: 6px; }
  .file-item {
    display: flex; align-items: center; gap: 8px; padding: 8px 10px;
    background: rgba(124,106,247,0.08); border: 1px solid rgba(124,106,247,0.2);
    border-radius: 8px; font-size: 11px;
    overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
  }

  .error { font-size: 11px; color: var(--danger); padding: 8px 10px; background: rgba(247,106,106,0.08); border: 1px solid rgba(247,106,106,0.2); border-radius: 8px; }
  .info { font-size: 11px; color: var(--success); padding: 8px 10px; background: rgba(106,247,176,0.08); border: 1px solid rgba(106,247,176,0.2); border-radius: 8px; }

  /* CHAT */
  .chat { display: flex; flex-direction: column; overflow: hidden; }
  .messages { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }

  .empty { margin: auto; text-align: center; color: var(--muted); }
  .empty .icon { font-size: 48px; display: block; margin-bottom: 14px; }
  .empty h2 { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
  .empty p { font-size: 12px; line-height: 1.7; max-width: 260px; margin: 0 auto; }

  .msg { display: flex; gap: 12px; animation: fadeUp 0.3s ease; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  .msg.user { flex-direction: row-reverse; }
  .msg.system { justify-content: center; }

  .avatar { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
  .avatar.user { background: rgba(124,106,247,0.2); }
  .avatar.assistant { background: rgba(247,197,106,0.15); }

  .bubble { max-width: 70%; padding: 12px 16px; border-radius: 12px; font-size: 13px; line-height: 1.7; }
  .msg.user .bubble { background: #1e1a3f; border: 1px solid rgba(124,106,247,0.3); border-top-right-radius: 2px; }
  .msg.assistant .bubble { background: #131320; border: 1px solid var(--border); border-top-left-radius: 2px; }
  .msg.system .bubble { background: rgba(106,247,176,0.08); border: 1px solid rgba(106,247,176,0.2); color: var(--success); font-size: 12px; text-align: center; max-width: 90%; }

  .typing { display: flex; gap: 4px; align-items: center; }
  .typing span { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); animation: bounce 1.2s infinite; }
  .typing span:nth-child(2){animation-delay:.2s} .typing span:nth-child(3){animation-delay:.4s}
  @keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}

  /* INPUT BAR */
  .input-wrap { border-top: 1px solid var(--border); background: var(--surface); }
  .hint { font-size: 10px; color: var(--muted); text-align: center; padding: 8px 0 0; letter-spacing: 0.5px; }
  .input-bar { display: flex; gap: 12px; padding: 12px 24px 16px; align-items: flex-end; }
  textarea {
    flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 12px;
    padding: 12px 16px; color: var(--text); font-family: 'DM Mono', monospace; font-size: 13px;
    outline: none; resize: none; min-height: 46px; max-height: 120px; line-height: 1.5; transition: border-color 0.2s;
  }
  textarea:focus { border-color: var(--accent); }
  textarea::placeholder { color: var(--muted); }
  textarea:disabled { opacity: 0.4; cursor: not-allowed; }

  .send {
    width: 46px; height: 46px; background: linear-gradient(135deg, var(--accent), #9b6af7);
    border: none; border-radius: 12px; cursor: pointer; font-size: 20px; color: white;
    display: flex; align-items: center; justify-content: center; transition: opacity 0.2s, transform 0.1s; flex-shrink: 0;
  }
  .send:hover { opacity: 0.85; }
  .send:active { transform: scale(0.95); }
  .send:disabled { opacity: 0.3; cursor: not-allowed; }

  .spinner { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.25); border-top-color: white; border-radius: 50%; animation: spin 0.6s linear infinite; display: inline-block; }
  @keyframes spin{to{transform:rotate(360deg)}}

  #file-input { display: none; }
</style>
</head>
<body>

<div class="app">

  <!-- HEADER -->
  <header class="header">
    <div class="logo">doc<span>RAG</span></div>
    <div class="badge">RAG · PDF · LLM</div>
    <div class="status">
      <div class="dot" id="status-dot"></div>
      <span id="status-text">awaiting setup</span>
    </div>
  </header>

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div>
      <p class="label">Groq API Key</p>
      <input type="password" id="api-key" placeholder="gsk_••••••••••••••" />
    </div>
    <div>
      <p class="label">Session ID</p>
      <input type="text" id="session-id" value="default_session" />
    </div>
    <div>
      <p class="label">Upload PDFs</p>
      <div class="dropzone" id="dropzone" onclick="document.getElementById('file-input').click()">
        <span class="dropzone-icon">📄</span>
        <p>Drop PDFs here or <strong>browse</strong></p>
      </div>
      <input type="file" id="file-input" accept=".pdf" multiple />
      <button class="btn" id="upload-btn" onclick="document.getElementById('file-input').click()">Select Files</button>
    </div>
    <div id="file-list-wrap" style="display:none">
      <p class="label">Loaded Files</p>
      <div class="file-list" id="file-list"></div>
    </div>
    <div id="msg-area"></div>
  </aside>

  <!-- CHAT -->
  <div class="chat">
    <div class="messages" id="messages">
      <div class="empty" id="empty-state">
        <span class="icon">🧠</span>
        <h2>Ask Your Documents</h2>
        <p>Upload PDFs on the left, then ask anything. Chat history is kept per session.</p>
      </div>
    </div>
    <div class="input-wrap">
      <p class="hint" id="hint">Upload PDFs to start chatting</p>
      <div class="input-bar">
        <textarea id="chat-input" placeholder="Upload PDFs first..." disabled rows="1"></textarea>
        <button class="send" id="send-btn" disabled>↑</button>
      </div>
    </div>
  </div>

</div>

<script>
  const API_BASE = "https://rag-chat-app.onrender.com"; // ← change if your backend is on a different port
  let isReady = false;

  // --- Drag & Drop ---
  const dz = document.getElementById('dropzone');
  dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('over'); });
  dz.addEventListener('dragleave', () => dz.classList.remove('over'));
  dz.addEventListener('drop', e => { e.preventDefault(); dz.classList.remove('over'); handleFiles(e.dataTransfer.files); });
  document.getElementById('file-input').addEventListener('change', e => handleFiles(e.target.files));

  // --- Upload ---
  async function handleFiles(files) {
    const apiKey = document.getElementById('api-key').value.trim();
    const sessionId = document.getElementById('session-id').value.trim() || 'default_session';
    if (!apiKey) { showMsg('Enter your Groq API key first.', 'error'); return; }

    const pdfs = Array.from(files).filter(f => f.type === 'application/pdf');
    if (!pdfs.length) { showMsg('Only PDF files are supported.', 'error'); return; }

    showMsg('<span class="spinner"></span> Processing PDFs...', 'info');
    document.getElementById('upload-btn').disabled = true;

    const formData = new FormData();
    pdfs.forEach(f => formData.append('files', f));
    formData.append('api_key', apiKey);
    formData.append('session_id', sessionId);

    try {
      const res = await fetch(`${API_BASE}/upload`, { method: 'POST', body: formData });
      const data = await res.json();
      if (data.success) {
        showMsg(`✅ ${pdfs.length} PDF(s) ready!`, 'info');
        renderFileList(pdfs.map(f => f.name));
        setReady(true, sessionId);
        addMessage('system', `✅ ${pdfs.length} PDF(s) processed. Start asking questions!`);
      } else {
        showMsg('❌ ' + (data.error || 'Upload failed.'), 'error');
      }
    } catch {
      showMsg('❌ Cannot reach backend. Is uvicorn running on port 8000?', 'error');
    }
    document.getElementById('upload-btn').disabled = false;
  }

  function renderFileList(names) {
    const list = document.getElementById('file-list');
    list.innerHTML = names.map(n => `<div class="file-item">📎 ${n}</div>`).join('');
    document.getElementById('file-list-wrap').style.display = 'block';
  }

  function setReady(val, sessionId) {
    isReady = val;
    document.getElementById('status-dot').classList.toggle('active', val);
    document.getElementById('status-text').textContent = val ? 'ready' : 'awaiting setup';
    document.getElementById('chat-input').disabled = !val;
    document.getElementById('chat-input').placeholder = val ? 'Ask a question about your documents...' : 'Upload PDFs first...';
    document.getElementById('send-btn').disabled = !val;
    document.getElementById('hint').textContent = val ? `Session: ${sessionId} · Enter to send` : 'Upload PDFs to start chatting';
  }

  function showMsg(html, type) {
    const el = document.getElementById('msg-area');
    el.className = type;
    el.innerHTML = html;
  }

  // --- Chat ---
  async function sendMessage() {
    const input = document.getElementById('chat-input');
    const question = input.value.trim();
    if (!question || !isReady) return;
    const apiKey = document.getElementById('api-key').value.trim();
    const sessionId = document.getElementById('session-id').value.trim() || 'default_session';

    input.value = '';
    input.style.height = 'auto';
    addMessage('user', question);
    const typingId = addTyping();
    document.getElementById('send-btn').disabled = true;
    input.disabled = true;

    try {
      const res = await fetch(`${API_BASE}/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question, api_key: apiKey, session_id: sessionId })
      });
      const data = await res.json();
      removeTyping(typingId);
      addMessage('assistant', data.answer || data.error || 'No response.');
    } catch {
      removeTyping(typingId);
      addMessage('assistant', '⚠️ Error reaching backend.');
    }

    document.getElementById('send-btn').disabled = false;
    input.disabled = false;
    input.focus();
  }

  function addMessage(role, text) {
    document.getElementById('empty-state')?.remove();
    const container = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    if (role === 'system') {
      div.innerHTML = `<div class="bubble">${text}</div>`;
    } else {
      div.innerHTML = `
        <div class="avatar ${role}">${role === 'user' ? '👤' : '🤖'}</div>
        <div class="bubble">${text}</div>`;
    }
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
    return div;
  }

  function addTyping() {
    document.getElementById('empty-state')?.remove();
    const container = document.getElementById('messages');
    const id = 'typing-' + Date.now();
    const div = document.createElement('div');
    div.className = 'msg assistant';
    div.id = id;
    div.innerHTML = `<div class="avatar assistant">🤖</div><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
    return id;
  }

  function removeTyping(id) {
    document.getElementById(id)?.remove();
  }

  // --- Keyboard ---
  document.getElementById('chat-input').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
  document.getElementById('chat-input').addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 120) + 'px';
  });
  document.getElementById('send-btn').addEventListener('click', sendMessage);
</script>
</body>
</html>
